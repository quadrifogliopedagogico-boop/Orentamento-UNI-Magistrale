<style>
:root{--bg:#fafbfd;--bg-warm:#f8f6f3;--bg-card:#fff;--bg-input:#f4f5f7;--accent:#3730a3;--accent-light:#6366f1;--accent-bg:rgba(55,48,163,.06);--green:#059669;--green-light:#d1fae5;--amber:#d97706;--rose:#e11d48;--cyan:#0891b2;--violet:#7c3aed;--text:#1e293b;--text-sec:#64748b;--text-mut:#94a3b8;--border:#e2e8f0;--border-light:#f1f5f9;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow:0 4px 16px rgba(0,0,0,.06);--shadow-lg:0 8px 30px rgba(0,0,0,.08);--radius:16px;--radius-sm:10px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

#pbo{height:14px;background:var(--border-light);width:100%;border-radius:0 0 7px 7px;overflow:hidden;position:relative;box-shadow:inset 0 1px 3px rgba(0,0,0,.08)}
#pbi{height:100%;width:0%;background:linear-gradient(90deg,#3730a3,#6366f1,#0891b2,#059669);transition:width .5s cubic-bezier(.4,0,.2,1);border-radius:0 7px 7px 0;position:relative;box-shadow:0 2px 8px rgba(55,48,163,.25);overflow:hidden}
#pbi::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:shimmer 2.2s infinite}
@keyframes shimmer{0%{left:-100%}100%{left:100%}}
#pbi-pct{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:.6em;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);white-space:nowrap;z-index:2}
.ctn{max-width:820px;margin:0 auto;padding:20px;padding-bottom:80px;position:relative;z-index:1}
.ws{text-align:center;padding:40px 20px;animation:fu .7s ease}
.ws h1{font-family:'Playfair Display',serif;font-size:2.2em;color:var(--text);margin-bottom:8px;line-height:1.15}
.ws h1 span{color:var(--accent)}
.ws .ci{font-size:3em;display:block;margin-bottom:14px;animation:pu 2.5s infinite}

.ws p{color:var(--text-sec);font-size:1.02em;line-height:1.7;max-width:580px;margin:0 auto 22px}
.uf{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:520px;margin:0 auto 22px;box-shadow:var(--shadow-sm)}

.uf input,.uf select{width:100%;padding:10px 13px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:1em;margin-bottom:13px;outline:none;transition:border .3s}
.uf input:focus,.uf select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 26px;border:none;border-radius:var(--radius-sm);font-family:'Source Sans 3',sans-serif;font-weight:700;font-size:.92em;cursor:pointer;transition:all .25s}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(55,48,163,.2)}.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(55,48,163,.3)}
.btn-s{background:var(--bg-card);color:var(--text);border:1px solid var(--border)}.btn-s:hover{border-color:var(--accent);background:var(--accent-bg)}

.btn-g{background:var(--green);color:#fff}.btn-g:hover{box-shadow:0 4px 14px rgba(5,150,105,.3)}
.btn-w{background:var(--amber);color:#fff}.btn-w:hover{box-shadow:0 4px 14px rgba(217,119,6,.3)}
.phase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin:20px 0}
.phase-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .3s;position:relative;box-shadow:var(--shadow-sm)}
.phase-card:hover{transform:translateY(-3px);border-color:var(--accent-light);box-shadow:var(--shadow)}
.phase-card .pi{font-size:1.6em;display:block;margin-bottom:6px}.phase-card .pn{font-weight:700;font-size:.85em;margin-bottom:2px}.phase-card .pd{font-size:.72em;color:var(--text-sec);line-height:1.4}
.phase-card .pb{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62em;font-weight:800}
.pb.ok{background:var(--green-light);color:var(--green)}.pb.no{background:var(--bg-input);color:var(--text-mut)}
.phase-card.done{border-color:var(--green);background:linear-gradient(135deg,#f0fdf4,#f0f9ff)}.phase-card.done .pn{color:var(--green)}
.phase-card.locked{opacity:.5;cursor:not-allowed;pointer-events:none}
.phase-card.active{border-color:var(--accent);background:var(--accent-bg)}
.qsec{animation:fu .4s ease}
.qc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:10px;transition:all .4s;position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.qc::after{content:'';position:absolute;top:0;left:0;width:0;height:100%;transition:width .5s;z-index:0}

.qc.ans{border-color:var(--accent-light)}.qc>*{position:relative;z-index:1}
.qc .qnum{font-family:'JetBrains Mono',monospace;font-size:.68em;color:var(--accent);font-weight:600;margin-bottom:4px}
.qc.ans .qnum::after{content:' \2713';color:var(--green);font-weight:800}
.qc .qt{font-size:.95em;line-height:1.55;margin-bottom:10px}
.ls{display:flex;gap:5px;flex-wrap:wrap}
.lo{flex:1;min-width:60px;text-align:center;padding:8px 4px;background:var(--bg-input);border:2px solid transparent;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;user-select:none}
.lo:hover{border-color:var(--accent-light);background:#eef2ff;transform:translateY(-1px)}
.lo.sel{border-color:var(--accent);background:linear-gradient(135deg,#eef2ff,#ede9fe)}
.lo .lv{font-family:'JetBrains Mono',monospace;font-size:1.2em;font-weight:700;color:var(--accent);display:block;margin-bottom:1px}
.lo .ll{font-size:.58em;color:var(--text-sec);text-transform:uppercase;letter-spacing:.3px;font-weight:700}
.area-sel{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:10px;cursor:pointer;transition:all .3s;position:relative}
.area-sel:hover{border-color:var(--accent-light);box-shadow:var(--shadow)}
.area-sel.chosen{border-color:var(--accent);background:var(--accent-bg)}
.area-sel .as-icon{font-size:1.8em;float:left;margin-right:12px}
.area-sel .as-name{font-weight:700;font-size:.95em;margin-bottom:2px}
.area-sel .as-desc{font-size:.78em;color:var(--text-sec);line-height:1.5}
.area-sel .as-pct{position:absolute;top:14px;right:14px;font-family:'JetBrains Mono',monospace;font-size:.9em;font-weight:700;color:var(--accent)}
.area-sel .as-bar{height:4px;background:var(--bg-input);border-radius:2px;margin-top:8px;overflow:hidden}
.area-sel .as-bf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width .8s}
.gate-card{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius);padding:24px;margin:16px 0;text-align:center;box-shadow:var(--shadow)}
.gate-card h3{font-family:'Playfair Display',serif;font-size:1.3em;color:var(--accent);margin-bottom:10px}
.gate-card .path-badge{display:inline-block;padding:6px 18px;border-radius:20px;font-weight:800;font-size:.9em;margin:8px 0}
.path-a{background:#d1fae5;color:#065f46}.path-b{background:#fef3c7;color:#92400e}.path-c{background:#fce7f3;color:#9d174d}
.gate-card .tension{background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--radius-sm);padding:12px;margin-top:12px;font-size:.85em;color:#991b1b;text-align:left}
.tb{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:10px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border)}
.tb .btn{font-size:.76em;padding:6px 12px}
.rp{animation:fu .5s ease}
.rc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.rc h3{font-family:'Playfair Display',serif;font-size:1.12em;margin-bottom:10px;color:var(--accent)}
.sbc{margin-bottom:10px}.sbl{display:flex;justify-content:space-between;margin-bottom:3px;font-size:.8em}
.sbl span:first-child{color:var(--text);font-weight:600}.sbl span:last-child{color:var(--accent);font-family:'JetBrains Mono',monospace;font-weight:600}
.sb{height:8px;background:var(--bg-input);border-radius:4px;overflow:hidden}
.sbf{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--accent),var(--accent-light))}
.cc{position:relative;height:280px;margin:14px 0}
.nt{font-size:.9em;line-height:1.85;color:var(--text-sec);padding:20px;background:var(--bg-warm);border-radius:var(--radius-sm);border-left:4px solid var(--accent)}
.nb{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:24px;padding:14px 18px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);position:sticky;bottom:10px;z-index:10}
.nc{font-family:'JetBrains Mono',monospace;font-size:.82em;color:var(--text-sec);font-weight:600}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.mo.act{display:flex}
.mc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);max-width:700px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow-lg)}
.mc h2{font-family:'Playfair Display',serif;margin-bottom:10px;color:var(--accent)}
.mc textarea{width:100%;min-height:280px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.75em;padding:12px;resize:vertical;outline:none}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:10px 22px;border-radius:var(--radius-sm);font-size:.84em;font-weight:600;opacity:0;transition:all .4s;z-index:500;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ph{display:none;text-align:center;margin-bottom:24px;padding-bottom:14px;border-bottom:3px solid var(--accent)}.ph h1{color:var(--accent);font-family:'Playfair Display',serif;font-size:1.6em}.ph p{color:var(--text-sec);margin-top:3px}
.blk-label{font-size:.72em;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-mut);margin:18px 0 6px;text-align:left}
.compare-card{background:linear-gradient(135deg,#f5f3ff,#eff6ff);border:1px solid var(--accent-light);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.compare-card h4{color:var(--accent);font-family:'Playfair Display',serif;margin-bottom:8px}
.st{position:fixed;bottom:20px;right:18px;z-index:200;background:var(--bg-card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1em;transition:all .3s;box-shadow:var(--shadow)}
.st:hover{border-color:var(--accent);transform:scale(1.08)}
@media print{body{background:#fff!important}body::before,.dot-bg{display:none!important}.tb,.st,#sticky-header,#progress-container,.no-print,.toast,.nb{display:none!important}.ctn{max-width:100%;padding:8px}.rc{break-inside:avoid;box-shadow:none!important}.ph{display:block!important}.cc{height:250px!important}}
@media(max-width:600px){.ws h1{font-size:1.4em}.ls{flex-direction:column}.lo{min-width:unset}.phase-grid{grid-template-columns:1fr}.ctn{padding:10px;padding-bottom:80px}.uf .row2{grid-template-columns:1fr}}
</style>
</head>

<script>
/* ============================================================

   ============================================================ */

/* ===== MACRO-AREE (13) ===== */
const AREAS=[
{id:'ing',name:'Ingegneria e Tecnologie Avanzate',icon:'⚙️',desc:'Ingegneria civile, industriale, aerospaziale, meccanica, elettronica, gestionale e dei materiali.'},
{id:'inf',name:'Informatica, Dati e IA',icon:'💻',desc:'Informatica, data science, cybersecurity, intelligenza artificiale, statistica e matematica applicata.'},
{id:'vita',name:'Scienze della Vita e Biotecnologie',icon:'🧬',desc:'Biologia, biotecnologie, nutrizione, scienze alimentari e scienze naturali.'},
{id:'terra',name:'Scienze della Terra e Ambiente',icon:'🌍',desc:'Scienze geologiche, ambientali, forestali, agrarie e zootecniche.'},
{id:'med',name:'Medico-Sanitaria e Farmaceutica',icon:'⚕️',desc:'Farmacia, professioni sanitarie magistrali, medicina veterinaria e scienze motorie preventive.'},
{id:'eco',name:'Economia, Management e Finanza',icon:'📊',desc:'Economia, finanza, management, scienze economico-aziendali e turismo.'},
{id:'giu',name:'Giuridico-Politica e Relazioni Internazionali',icon:'⚖️',desc:'Scienze politiche, relazioni internazionali, pubblica amministrazione e cooperazione allo sviluppo.'},
{id:'uma',name:'Umanistica, Lingue e Patrimonio Culturale',icon:'📜',desc:'Filologia, lingue, filosofia, storia, archeologia, traduzione e beni culturali.'},
{id:'com',name:'Comunicazione, Media e Industrie Creative',icon:'📡',desc:'Comunicazione pubblica e d\'impresa, informazione editoriale, e-learning e media education.'},
{id:'edu',name:'Educazione, Formazione e Scienze Pedagogiche',icon:'🎓',desc:'Programmazione educativa, formazione degli adulti, pedagogia e scienze della formazione.'},
{id:'psi',name:'Psicologia, Scienze Sociali e Servizio Sociale',icon:'🧠',desc:'Psicologia, sociologia, servizio sociale e politiche sociali.'},
{id:'arc',name:'Architettura, Design e Territorio',icon:'🏛️',desc:'Architettura, design, paesaggio, urbanistica e pianificazione territoriale.'},
{id:'mot',name:'Scienze Motorie e Sport',icon:'🏃',desc:'Organizzazione e gestione dello sport, scienze e tecniche dello sport, attività motorie preventive e adattate.'}
];
const areaIdx=k=>AREAS.findIndex(a=>a.id===k);

/* ===== MODULE A — QUESTIONNAIRE SECTIONS ===== */
const MOD_A=[

/* --- Sezione 1: Centramento sulla Triennale --- */
{id:'centramento',title:'Centramento sulla Triennale',subtitle:'Il rapporto con il tuo percorso triennale',instruction:'Rispondi pensando alla tua esperienza concreta nel corso di laurea triennale (o equivalente). Se hai un percorso ancora in corso, rispondi sulla base di ciò che sai finora.',icon:'🎯',
scale:[{v:0,l:'Per niente'},{v:1,l:'Poco'},{v:2,l:'In parte'},{v:3,l:'Molto'},{v:4,l:'Completamente'}],
items:[
{n:1,t:'Ho scelto la mia triennale con piena consapevolezza delle implicazioni professionali e formative',a:'Consapevolezza'},
{n:2,t:'Se potessi tornare indietro, rifarei la stessa scelta senza esitazioni',a:'Consapevolezza'},
{n:3,t:'La mia triennale ha corrisposto alle aspettative che avevo prima di iscrivermi',a:'Delta Attese'},
{n:4,t:'Ho scoperto contenuti o metodi che non mi aspettavo e che mi hanno entusiasmato',a:'Delta Attese'},
{n:5,t:'Mi riconosco nell\'identità disciplinare che il mio percorso mi ha dato',a:'Identità'},
{n:6,t:'Sento che la triennale ha confermato e rafforzato i miei interessi iniziali',a:'Identità'},
{n:7,t:'C\'è stata almeno un\'area o un insegnamento che mi ha fatto pensare "avrei dovuto fare quest\'altro"',a:'Biforcazioni',r:true},
{n:8,t:'Ho avuto periodi in cui ho seriamente considerato di cambiare percorso',a:'Biforcazioni',r:true},
{n:9,t:'Mi sento soddisfatto/a della preparazione acquisita finora',a:'Soddisfazione'},
{n:10,t:'Il mio percorso triennale mi ha dato strumenti concreti e spendibili',a:'Soddisfazione'},
{n:11,t:'La mia idea di "chi voglio diventare professionalmente" è cambiata rispetto a quando mi sono iscritto/a',a:'Evoluzione',r:true},
{n:12,t:'Oggi i miei interessi disciplinari sono significativamente diversi da quelli iniziali',a:'Evoluzione',r:true}],
areas:{
'Consapevolezza':{d:'Grado di consapevolezza nella scelta della triennale',i:[1,2],m:8},
'Delta Attese':{d:'Distanza tra aspettative e realtà del percorso',i:[3,4],m:8},
'Identità':{d:'Solidità dell\'identità disciplinare acquisita',i:[5,6],m:8},
'Biforcazioni':{d:'Presenza di percorsi alternativi non esplorati',i:[7,8],m:8,neg:true},
'Soddisfazione':{d:'Soddisfazione complessiva per la preparazione',i:[9,10],m:8},
'Evoluzione':{d:'Grado di cambiamento degli interessi durante il percorso',i:[11,12],m:8,neg:true}}},

/* --- Sezione 2: Locus of Control Evoluto --- */
{id:'locus',title:'Locus of Control',subtitle:'Chi guida le tue scelte professionali?',instruction:'Esprimi il tuo grado di accordo. Rispondi pensando alla tua esperienza universitaria e alle decisioni professionali che hai già preso o stai considerando.',icon:'🧭',
scale:[{v:0,l:'Falso'},{v:1,l:'Poco vero'},{v:2,l:'Incerto'},{v:3,l:'Vero'},{v:4,l:'Molto vero'}],
items:[
{n:1,t:'I risultati accademici che ho ottenuto dipendono principalmente dal mio impegno e dal mio metodo',a:'Interno'},
{n:2,t:'Le opportunità professionali migliori arrivano per conoscenze e fortuna, non per competenza',a:'Esterno'},

function bip(f,d,t,g){if(!sndOn)return;try{AC.resume().then(()=>{const o=AC.createOscillator(),gn=AC.createGain();o.connect(gn);gn.connect(AC.destination);o.type=t||'sine';o.frequency.value=f;gn.gain.value=g||.08;o.start();gn.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.stop(AC.currentTime+d)})}catch(e){}}

/* ===== SCORING HELPERS ===== */
function calcSectionScores(section,ans){
  const res={};
  for(const[aName,aData]of Object.entries(section.areas)){
    let sum=0,cnt=0;
    aData.i.forEach(n=>{if(ans[n]!==undefined){let v=ans[n];sum+=v;cnt++}});
    const pct=aData.m>0?Math.round(sum/aData.m*100):0;
    res[aName]={sum,max:aData.m,pct,neg:!!aData.neg,desc:aData.d,cnt};
  }
  return res;
}

function calcAllModAScores(){
  const all={};
  MOD_A.forEach(s=>{all[s.id]=calcSectionScores(s,answers[s.id]||{})});
  return all;
}

function calcModBScores(){
  return MOD_B.map(s=>({id:s.id,scores:calcSectionScores(s,answers[s.id]||{})}));
}

/* ===== CENTRAMENTO SCORE ===== */
function calcCentramento(){
  const a=answers.centramento||{};
  const sec=MOD_A[0];
  const sc=calcSectionScores(sec,a);
  // Centramento positivo = Consapevolezza + Identità + Soddisfazione + Delta Attese
  // Centramento negativo = Biforcazioni + Evoluzione (già neg)
  let pos=0,neg=0,cnt=0;
  ['Consapevolezza','Identità','Soddisfazione','Delta Attese'].forEach(k=>{
    if(sc[k]){pos+=sc[k].pct;cnt++}
  });
  ['Biforcazioni','Evoluzione'].forEach(k=>{
    if(sc[k]){neg+=sc[k].pct;cnt++}
  });
  if(cnt===0) return 50;
  const posAvg=pos/4, negAvg=neg/2;
  // Alto centramento = posAvg alto + negAvg basso
  // Score 0-100 dove 100 = perfettamente centrato
  return Math.round(Math.max(0,Math.min(100, posAvg - negAvg*0.5 + 25)));
}

/* ===== GATE LOGIC ===== */
function computeGate(){
  const centScore=calcCentramento();
  const sc=calcAllModAScores();
  const mapping=getTriMapping(userData.classeTri);
  const carrSc=calcSectionScores(SNODO_CARRIERA, answers[SNODO_CARRIERA.id]||{});

  // === 1. CALCOLO PRONTEZZA LM (0-100) ===
  let prontezza=0;

  // a) Centramento sulla triennale (peso 20%)
  // Centramento basso = segnale di riorientamento necessario prima della LM
  prontezza += Math.min(centScore, 100) * 0.20;

  // b) Concentrazione degli interessi (peso 25%)
  // Interessi concentrati = direzione chiara, interessi piatti = serve esperienza
  const intScores=[];
  AREAS.forEach(area=>{
    const items=SNODO_INTERESSI.items.filter(it=>it.a===area.id);
    let sum=0,cnt=0;
    items.forEach(it=>{if(snodoInteressi[it.n]!==undefined){sum+=snodoInteressi[it.n];cnt++}});
    intScores.push(cnt>0?sum/(cnt*4)*100:50);
  });
  intScores.sort((a,b)=>b-a);
  // Concentrazione = delta tra top-3 e bottom-3
  const top3avg=(intScores[0]+intScores[1]+intScores[2])/3;
  const bot3avg=(intScores[10]+intScores[11]+intScores[12])/3;
  const concentrazione=Math.min(100, Math.max(0, (top3avg-bot3avg)*2));
  prontezza += concentrazione * 0.25;

  // c) Orientamento ricerca dal Modulo A (peso 15%)
  const appSc=sc.apprendimento;
  const ricercaPct=appSc?.['Ricerca']?.pct||50;
  // Forte ricerca = LM quasi necessaria (dottorato richiede LM)
  prontezza += ricercaPct * 0.15;

  // d) Coping e locus (peso 15%)
  // Evitante alto + locus esterno = rischio dispersione
  const copingAttivo=sc.coping?.['Attivo']?.pct||50;
  const copingEvitante=sc.coping?.['Evitante']?.pct||50;
  const locusInterno=sc.locus?.['Interno']?.pct||50;
  const profiloPsy=Math.max(0, (copingAttivo - copingEvitante*0.5 + locusInterno) / 2);
  prontezza += Math.min(profiloPsy, 100) * 0.15;

  // e) Orientamento carriera (peso 25%)
  const ricercaCarr=carrSc['Ricerca']?.pct||0;
  const profCarr=carrSc['Professione']?.pct||0;
  const imprCarr=carrSc['Imprenditorialità']?.pct||0;
  const urgenza=carrSc['Urgenza']?.pct||0;
  const sostenibilita=carrSc['Sostenibilità']?.pct||0;
  // Ricerca alta → LM necessaria, Imprenditorialità alta → LM opzionale, Urgenza alta → LM rischiosa
  const carrProntezza = ricercaCarr*0.5 + profCarr*0.3 - imprCarr*0.1 - urgenza*0.3 + sostenibilita*0.3;
  prontezza += Math.max(0, Math.min(100, carrProntezza + 30)) * 0.25;

  prontezza=Math.round(Math.max(0, Math.min(100, prontezza)));

  // === 2. CALCOLO PERCORSO A/B/C (automatico) ===
  // Basato su: dove cadono gli interessi più alti rispetto alla triennale?
  let directScore=0, adjacentScore=0, otherScore=0, directCnt=0, adjCnt=0, otherCnt=0;
  AREAS.forEach(area=>{
    const items=SNODO_INTERESSI.items.filter(it=>it.a===area.id);
    let sum=0,cnt=0;
    items.forEach(it=>{if(snodoInteressi[it.n]!==undefined){sum+=snodoInteressi[it.n];cnt++}});
    const areaPct=cnt>0?sum/(cnt*4)*100:0;
    if(mapping.direct.includes(area.id)){directScore+=areaPct;directCnt++}
    else if(mapping.adjacent.includes(area.id)){adjacentScore+=areaPct;adjCnt++}
    else{otherScore+=areaPct;otherCnt++}
  });
  const directAvg=directCnt>0?directScore/directCnt:0;
  const adjAvg=adjCnt>0?adjacentScore/adjCnt:0;
  const otherAvg=otherCnt>0?otherScore/otherCnt:0;

  let path='C';
  if(directAvg>=adjAvg && directAvg>=otherAvg && directAvg>30) path='A';
  else if(adjAvg>=otherAvg && adjAvg>30) path='B';

  // Caso ALTRO/ESTERO: nessun mapping → sempre C
  if(mapping.direct.length===0) path='C';

  // === 3. NARRAZIONE DIAGNOSTICA ===
  let narrazione='';
  let segnali=[];

  // Prontezza LM
  if(prontezza>=65){
    narrazione+='<strong>Indicatore di prontezza per la LM: '+prontezza+'%.</strong> Il tuo profilo mostra segnali coerenti con l\'iscrizione a una laurea magistrale: ';
    if(ricercaCarr>60) narrazione+='forte orientamento alla ricerca, ';
    if(concentrazione>60) narrazione+='interessi disciplinari concentrati, ';
    if(centScore>60) narrazione+='buon centramento sulla triennale. ';
    else narrazione+='anche se il centramento sulla triennale non è elevato. ';
  } else if(prontezza>=40){
    narrazione+='<strong>Indicatore di prontezza per la LM: '+prontezza+'%.</strong> Il tuo profilo presenta segnali misti. La magistrale è un\'opzione percorribile, ma non è l\'unica. ';
  } else {
    narrazione+='<strong>Indicatore di prontezza per la LM: '+prontezza+'%.</strong> Il tuo profilo suggerisce che un ingresso nel mondo del lavoro o una formazione professionalizzante breve potrebbe meritare considerazione prima di (o al posto di) un biennio magistrale. ';
  }

  // Segnali specifici
  if(urgenza>60 && sostenibilita<40){
    segnali.push('Segnali di urgenza economica ('+urgenza+'%) con bassa sostenibilità per ulteriori studi ('+sostenibilita+'%): valuta se un percorso lavorativo immediato con formazione parallela sia più realistico.');
  }
  if(copingEvitante>60){
    segnali.push('Stile di coping prevalentemente evitante ('+copingEvitante+'%): la magistrale richiede alta autonomia e gestione di carichi concentrati. Sviluppare strategie di fronteggiamento attivo è prioritario, a prescindere dalla scelta.');
  }
  if(imprCarr>60 && ricercaCarr<30){
    segnali.push('Forte orientamento imprenditoriale ('+imprCarr+'%) con scarso interesse per la ricerca: la magistrale non è l\'unica via. Valuta master professionalizzanti, incubatori o ingresso diretto nel mercato.');
  }
  if(centScore<35 && concentrazione<30){
    segnali.push('Centramento basso sulla triennale ('+centScore+'%) e interessi disciplinari distribuiti: potrebbe essere utile un\'esperienza lavorativa o un percorso di orientamento prima di scegliere un biennio specialistico.');
  }
  if(concentrazione>70){
    segnali.push('Interessi molto concentrati (top-3 media: '+Math.round(top3avg)+'%): la direzione è chiara.');
  }

  // Percorso
  const pathNames={A:'Continuità',B:'Complementarità',C:'Esplorazione aperta'};
  narrazione+='<br><br><strong>Percorso suggerito: '+path+' — '+pathNames[path]+'.</strong> ';
  if(path==='A') narrazione+='I tuoi interessi più forti ricadono nelle aree direttamente collegate alla tua triennale (media: '+Math.round(directAvg)+'%). Il biennio in continuità è la scelta più coerente con il tuo profilo.';
  else if(path==='B') narrazione+='I tuoi interessi più forti ricadono nelle aree adiacenti alla tua triennale (media: '+Math.round(adjAvg)+'%). Un percorso complementare potrebbe offrirti il miglior rapporto tra ampliamento e coerenza.';
  else narrazione+='I tuoi interessi non si concentrano nelle aree direttamente collegate alla triennale. L\'esplorazione è aperta: la classifica delle aree nella fase successiva è il tuo strumento principale.';

  if(segnali.length>0){
    narrazione+='<br><br><strong>Segnali da considerare:</strong><br>';
    segnali.forEach(s=>{narrazione+='⚠️ '+s+'<br>'});
  }

  narrazione+='<br><em>Questa è una restituzione diagnostica, non una prescrizione. La scelta finale è tua: puoi procedere con l\'esplorazione delle magistrali, modificare il percorso suggerito, o decidere di esplorare alternative alla LM.</em>';

  gateResult={path,centScore,prontezza,concentrazione,narrazione,segnali,
    carriera:{ricerca:ricercaCarr,professione:profCarr,imprenditorialita:imprCarr,urgenza,sostenibilita},
    interessi:{directAvg:Math.round(directAvg),adjAvg:Math.round(adjAvg),otherAvg:Math.round(otherAvg)}};
  return gateResult;
}

/* ===== AREA AFFINITY CALCULATION ===== */
function calcAreaAffinity(){
  const sc=calcAllModAScores();
  const mapping=getTriMapping(userData.classeTri);
  const affinities=[];

  AREAS.forEach((area)=>{
    let score=0;

    // PESO PRIMARIO (60%): Interessi disciplinari dichiarati nello Snodo
    // 2 domande per area, max 8 punti → percentuale
    const si=snodoInteressi;
    const items=SNODO_INTERESSI.items.filter(it=>it.a===area.id);
    let intSum=0,intCnt=0;
    items.forEach(it=>{if(si[it.n]!==undefined){intSum+=si[it.n];intCnt++}});
    const intPct=intCnt>0?intSum/(intCnt*4)*100:50;
    score+=intPct*0.60;

    // PESO STRUTTURALE (20%): Accessibilità normativa dalla classe triennale
    if(gateResult){
      if(gateResult.path==='A'){
        if(mapping.direct.includes(area.id)) score+=20;
        else if(mapping.adjacent.includes(area.id)) score+=8;
      } else if(gateResult.path==='B'){
        if(mapping.direct.includes(area.id)) score+=12;
        if(mapping.adjacent.includes(area.id)) score+=18;
      } else { // Percorso C: bonus minimo per accessibilità diretta
        if(mapping.direct.includes(area.id)) score+=5;
        if(mapping.adjacent.includes(area.id)) score+=3;
      }
    }

    // PESO SECONDARIO (20%): Profilo Modulo A
    const app=sc.apprendimento;
    if(app){
      const researchAreas=['inf','vita','terra','uma','psi'];
      const appliedAreas=['ing','eco','med','mot','arc'];
      if(researchAreas.includes(area.id)) score+=(app['Ricerca']?.pct||50)/100*8;
      if(appliedAreas.includes(area.id)) score+=(app['Applicazione']?.pct||50)/100*8;
    }
    const ss=sc.softskills;
    if(ss){
      if(area.id==='eco'||area.id==='ing') score+=(ss['Gestione Progettuale']?.pct||ss['Project Mgmt']?.pct||50)/100*4;
      if(area.id==='edu'||area.id==='psi') score+=(ss['Comunicazione Interculturale']?.pct||50)/100*4;
      if(area.id==='uma'||area.id==='com') score+=(ss['Scrittura Accademica']?.pct||50)/100*4;
      if(area.id==='inf') score+=(ss['Pensiero Sistemico']?.pct||50)/100*4;
    }

    affinities.push({id:area.id,name:area.name,icon:area.icon,desc:area.desc,pct:Math.round(Math.max(5,Math.min(100,score)))});
  });

  affinities.sort((a,b)=>b.pct-a.pct);
  return affinities;
}

/* ===== ADAPTIVE SCORING ===== */
function calcAdaptiveScores(){
  const results={};
  selectedAreas.forEach(areaId=>{
    const areaLMs=LM_DB.filter(lm=>lm.a===areaId);
    const areaAns=adaptiveAnswers[areaId]||{};
    const lmScores=[];
    areaLMs.forEach(lm=>{
      const lmAns=areaAns[lm.c]||{};
      let sum=0,cnt=0;
      for(let q=1;q<=5;q++){if(lmAns[q]!==undefined){sum+=lmAns[q];cnt++}}
      lmScores.push({code:lm.c,name:lm.n,pct:cnt>0?Math.round(sum/20*100):0,answered:cnt});
    });
    lmScores.sort((a,b)=>b.pct-a.pct);
    results[areaId]=lmScores;
  });
  return results;
}

/* ===== TOTAL QUESTION COUNT ===== */
function getTotalQuestions(){
  let total=0;
  MOD_A.forEach(s=>total+=s.items.length);
  total+=SNODO_INTERESSI.items.length; // 26 interessi disciplinari
  total+=SNODO_CARRIERA.items.length; // 12 carriera/settore
  // adattivo
  selectedAreas.forEach(areaId=>{
    total+=LM_DB.filter(lm=>lm.a===areaId).length*5;
  });
  MOD_B.forEach(s=>total+=s.items.length);
  return total;
}

function getAnsweredCount(){
  let done=0;
  MOD_A.forEach(s=>{const a=answers[s.id]||{};done+=Object.keys(a).length});
  done+=Object.keys(snodoInteressi).length; // interessi disciplinari
  done+=Object.keys(answers[SNODO_CARRIERA.id]||{}).length; // carriera
  selectedAreas.forEach(areaId=>{
    const aa=adaptiveAnswers[areaId]||{};
    Object.values(aa).forEach(lmA=>{done+=Object.keys(lmA).length});
  });
  MOD_B.forEach(s=>{const a=answers[s.id]||{};done+=Object.keys(a).length});
  return done;
}

    const n=s.items.filter(it=>a[it.n]!==undefined).length;
    const isDone=n===s.items.length;
    h+=`<div class="phase-card ${isDone?'done':''}" onclick="openModA(${i})"><span class="pi">${s.icon}</span><div class="pn">${s.title}</div><div class="pd">${s.items.length} domande · ${n}/${s.items.length}</div><div class="pb ${isDone?'ok':'no'}">${isDone?'✓':(i+1)}</div></div>`;
  });
  h+=`</div>`;

  // FASE 2: Snodo
  h+=`<div class="blk-label">Fase 2 · Snodo</div><div class="phase-grid">`;
  h+=`<div class="phase-card ${gateDone?'done':(!modADone?'locked':'active')}" onclick="${modADone?'showSnodo()':'toast(\'Completa prima tutte le sezioni della Fase 1\')'}"><span class="pi">🚦</span><div class="pn">Snodo — Diagnostica</div><div class="pd">${gateDone?'Prontezza LM: '+gateResult.prontezza+'% · Percorso '+gateResult.path:(interDone&&carrDone?'Dati raccolti — genera la diagnostica':(interDone?'Interessi ✓ — compila Carriera':'Interessi disciplinari + Orientamento professionale + Diagnostica'))}</div><div class="pb ${gateDone?'ok':'no'}">${gateDone?'✓':'—'}</div></div>`;
  h+=`</div>`;

  // FASE 3: Selezione aree + Adattivo
  h+=`<div class="blk-label">Fase 3 · Esplorazione Magistrali</div><div class="phase-grid">`;
  h+=`<div class="phase-card ${areasDone?'done':(!gateDone?'locked':'active')}" onclick="${gateDone?'showAreaSelection()':'toast(\'Completa prima lo Snodo\')'}"><span class="pi">🗺️</span><div class="pn">Selezione Aree</div><div class="pd">${areasDone?selectedAreas.map(id=>AREAS.find(a=>a.id===id)?.icon||'').join(' ')+' '+selectedAreas.length+' aree scelte':'Scegli le macro-aree da esplorare'}</div><div class="pb ${areasDone?'ok':'no'}">${areasDone?'✓':'—'}</div></div>`;
  if(areasDone){
    selectedAreas.forEach(aId=>{
      const area=AREAS.find(a=>a.id===aId);
      const lms=LM_DB.filter(lm=>lm.a===aId);
      const aa=adaptiveAnswers[aId]||{};
      let lmDone=0;lms.forEach(lm=>{const la=aa[lm.c]||{};if(Object.keys(la).length===5)lmDone++});
      const isDone=lmDone===lms.length;
      h+=`<div class="phase-card ${isDone?'done':''}" onclick="openAdaptive('${aId}')"><span class="pi">${area?.icon||'📘'}</span><div class="pn">${area?.name||aId}</div><div class="pd">${lms.length} LM · ${lmDone}/${lms.length} completate</div><div class="pb ${isDone?'ok':'no'}">${isDone?'✓':'…'}</div></div>`;
    });
  }
  h+=`</div>`;

  // PHASE 4: Module B
  h+=`<div class="blk-label">Fase 4 · Progetto di Vita</div><div class="phase-grid">`;
  MOD_B.forEach((s,i)=>{
    const a=answers[s.id]||{};
    const n=s.items.filter(it=>a[it.n]!==undefined).length;
    const isDone=n===s.items.length;
    const locked=!adaptDone && !areasDone;
    h+=`<div class="phase-card ${isDone?'done':(locked?'locked':'')}" onclick="${locked?'toast(\'Completa prima l\\\'esplorazione delle magistrali\')':'openModB('+i+')'}"><span class="pi">${s.icon}</span><div class="pn">${s.title}</div><div class="pd">${s.items.length} domande · ${n}/${s.items.length}</div><div class="pb ${isDone?'ok':'no'}">${isDone?'✓':(i+1)}</div></div>`;
  });
  h+=`</div>`;

  // Actions
  h+=`<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px">`;
  h+=`<button class="btn ${allDone?'btn-g':'btn-p'}" onclick="showReport()">📊 ${allDone?'Vedi Report':'Report parziale'}</button>`;
  h+=`<button class="btn btn-s btn-sm" onclick="saveState()">💾 Salva</button>`;
  h+=`<button class="btn btn-s btn-sm" onclick="loadState()">📂 Carica</button>`;
  h+=`<button class="btn btn-s btn-sm" onclick="showWelcome()">↩ Modifica dati</button>`;
  if(allDone) h+=`<button class="btn btn-s btn-sm" onclick="showOpReport()">👨‍🏫 Operatore</button>`;
  h+=`</div></div>`;
  app.innerHTML=h;
}

/* ===== UI: QUESTIONNAIRE RENDER (generic for ModA/ModB) ===== */
function renderSection(section, backFn, nextFn, nextLabel){
  const a=answers[section.id]||{};
  if(!answers[section.id]) answers[section.id]={};
  const done=section.items.filter(it=>a[it.n]!==undefined).length;

  $('sticky-header').style.display='';$('progress-container').style.display='';
  $('hT').textContent=section.icon+' '+section.title;
  $('hS').textContent=section.subtitle;
  $('hI').textContent=section.instruction;
  const sn=$('stickyNav');sn.style.display='flex';
  sn.innerHTML=`<span style="font-size:.78em;color:var(--text-sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${section.icon} ${section.title}</span><span class="nc" id="snc">${done}/${section.items.length}</span>`;

  let h=`<div class="qsec" style="padding-top:90px">`;
  h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px;box-shadow:var(--shadow-sm)"><div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><span style="font-size:2em">${section.icon}</span><div><div style="font-family:'Playfair Display',serif;font-size:1.2em;color:var(--accent);font-weight:700">${section.title}</div><div style="font-size:.85em;color:var(--text-sec);margin-top:2px">${section.subtitle}</div></div></div><div style="font-size:.88em;color:var(--text-sec);background:var(--accent-bg);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;line-height:1.6">${section.instruction}</div></div>`;

  section.items.forEach((it,idx)=>{
    const ans=a[it.n];const isAns=ans!==undefined;
    h+=`<div class="qc ${isAns?'ans':''}" id="qc${it.n}"><div class="qnum">${it.r?'↻ ':''}DOMANDA ${it.n} di ${section.items.length}</div><div class="qt">${it.t}</div><div class="ls">`;
    section.scale.forEach(s=>{h+=`<div class="lo ${ans===s.v?'sel':''}" onclick="pickQ('${section.id}',${it.n},${s.v},this)"><span class="lv">${s.v}</span><span class="ll">${s.l}</span></div>`});
    h+=`</div></div>`;
  });

  const allDone=done===section.items.length;
  h+=`<div class="nb"><button class="btn btn-s btn-sm" onclick="${backFn}">← Menu</button><div class="nc" id="bnc">${done}/${section.items.length} risposte</div><button class="btn btn-sm ${allDone?'btn-g':'btn-p'}" id="bnb" onclick="${nextFn}">${nextLabel}</button></div></div>`;
  app.innerHTML=h;
  updateGlobalBar();
  window.scrollTo({top:0,behavior:'smooth'});
}

function pickQ(sid,n,v,el){
  sClick();answers[sid][n]=v;
  const card=el.closest('.qc');card.querySelectorAll('.lo').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');card.classList.add('ans');
  // Update counters
  const section=[...MOD_A,...MOD_B,SNODO_CARRIERA].find(s=>s.id===sid);
  if(section){
    const a=answers[sid]||{};
    const done=section.items.filter(it=>a[it.n]!==undefined).length;
    const snc=$('snc');if(snc)snc.textContent=done+'/'+section.items.length;
    const bnc=$('bnc');if(bnc)bnc.textContent=done+'/'+section.items.length+' risposte';
    if(done===section.items.length){sDone();toast('Sezione completata! ✨',2000)}
  }
  updateGlobalBar();
}

function openModA(idx){
  curPhase='modA';curSection=idx;
  const s=MOD_A[idx];
  const hasNext=idx<MOD_A.length-1;
  const nextFn=hasNext?`openModA(${idx+1})`:'showHub()';
  const nextLabel=hasNext?'Avanti →':'✓ Menu';
  renderSection(s,'showHub()',nextFn,nextLabel);
}

function openModB(idx){
  curPhase='modB';curSection=idx;
  const s=MOD_B[idx];
  const hasNext=idx<MOD_B.length-1;
  const nextFn=hasNext?`openModB(${idx+1})`:'showHub()';
  const nextLabel=hasNext?'Avanti →':'✓ Menu';
  renderSection(s,'showHub()',nextFn,nextLabel);
}

/* ===== UI: GATE ===== */
/* ===== UI: SNODO (Interessi + Intenzione) ===== */
function showSnodo(){
  curPhase='snodo';
  // Passo 1: se interessi non compilati → questionario interessi
  if(Object.keys(snodoInteressi).length<26){
    showSnodoInteressi();return;
  }
  // Passo 2: se carriera non compilata → questionario carriera
  const carrAns=answers[SNODO_CARRIERA.id]||{};
  if(Object.keys(carrAns).length<SNODO_CARRIERA.items.length){
    showSnodoCarriera();return;
  }
  // Passo 3: calcola diagnostica e mostra risultato
  if(!gateResult) computeGate();
  showSnodoResult();
}

function showSnodoInteressi(){
  const si=SNODO_INTERESSI;
  if(!snodoInteressi)snodoInteressi={};
  const done=si.items.filter(it=>snodoInteressi[it.n]!==undefined).length;

  $('sticky-header').style.display='';$('progress-container').style.display='';
  $('hT').textContent=si.icon+' '+si.title;
  $('hS').textContent=si.subtitle;
  $('hI').textContent=si.instruction;
  const sn=$('stickyNav');sn.style.display='flex';
  sn.innerHTML=`<span style="font-size:.78em;color:var(--text-sec)">${si.icon} ${si.title}</span><span class="nc" id="snc">${done}/${si.items.length}</span>`;

  let h=`<div class="qsec" style="padding-top:90px">`;
  h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px;box-shadow:var(--shadow-sm)"><div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><span style="font-size:2em">${si.icon}</span><div><div style="font-family:'Playfair Display',serif;font-size:1.2em;color:var(--accent);font-weight:700">${si.title}</div><div style="font-size:.85em;color:var(--text-sec);margin-top:2px">${si.subtitle}</div></div></div><div style="font-size:.88em;color:var(--text-sec);background:var(--accent-bg);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;line-height:1.6">${si.instruction}</div></div>`;

  let lastArea='';
  si.items.forEach((it,idx)=>{
    const area=AREAS.find(a=>a.id===it.a);
    if(it.a!==lastArea){
      lastArea=it.a;
      h+=`<div style="background:var(--accent-bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin:14px 0 8px;font-weight:700;font-size:.85em;color:var(--accent)">${area?.icon||''} ${area?.name||it.a}</div>`;
    }
    const ans=snodoInteressi[it.n];const isAns=ans!==undefined;
    h+=`<div class="qc ${isAns?'ans':''}" id="sqc${it.n}"><div class="qnum">DOMANDA ${it.n} di ${si.items.length}</div><div class="qt">${it.t}</div><div class="ls">`;
    si.scale.forEach(s=>{h+=`<div class="lo ${ans===s.v?'sel':''}" onclick="pickSnodoInt(${it.n},${s.v},this)"><span class="lv">${s.v}</span><span class="ll">${s.l}</span></div>`});
    h+=`</div></div>`;
  });

  const allDone=done===si.items.length;
  h+=`<div class="nb"><button class="btn btn-s btn-sm" onclick="showHub()">← Menu</button><div class="nc" id="bnc">${done}/${si.items.length} risposte</div><button class="btn btn-sm ${allDone?'btn-g':'btn-p'}" onclick="${allDone?'showSnodoCarriera()':'toast(\\\'Completa tutte le domande\\\')'}">${allDone?'Avanti — Carriera →':'Completa per proseguire'}</button></div></div>`;
  app.innerHTML=h;
  updateGlobalBar();
  window.scrollTo({top:0,behavior:'smooth'});
}

function pickSnodoInt(n,v,el){
  sClick();snodoInteressi[n]=v;
  const card=el.closest('.qc');card.querySelectorAll('.lo').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');card.classList.add('ans');
  const si=SNODO_INTERESSI;
  const done=si.items.filter(it=>snodoInteressi[it.n]!==undefined).length;
  const snc=$('snc');if(snc)snc.textContent=done+'/'+si.items.length;
  const bnc=$('bnc');if(bnc)bnc.textContent=done+'/'+si.items.length+' risposte';
  if(done===si.items.length){sDone();toast('Interessi completati! ✨',2000)}
  updateGlobalBar();
}

function showSnodoCarriera(){
  curPhase='snodo';
  const sc=SNODO_CARRIERA;
  if(!answers[sc.id]) answers[sc.id]={};
  renderSection(sc,'showHub()','showSnodoDiagnostica()','Genera diagnostica →');
}

function showSnodoDiagnostica(){
  // Verifica completamento carriera
  const carrAns=answers[SNODO_CARRIERA.id]||{};
  if(Object.keys(carrAns).length<SNODO_CARRIERA.items.length){
    toast('Completa tutte le domande sulla carriera');return;
  }
  gateResult=null; // ricalcola
  computeGate();
  showSnodoResult();
}

  curPhase='snodo';
  $('sticky-header').style.display='none';$('progress-container').style.display='none';
  const g=gateResult;
  const pathClass=g.path==='A'?'path-a':(g.path==='B'?'path-b':'path-c');
  const pathNames={A:'Continuità',B:'Complementarità',C:'Esplorazione aperta'};

<div class="gate-card" style="text-align:left">
<div style="display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-bottom:16px">
<div style="text-align:center"><div style="font-size:2em;font-weight:800;color:${prontCol}">${g.prontezza}%</div><div style="font-size:.75em;color:var(--text-sec)">Prontezza LM</div></div>
<div style="text-align:center"><div style="font-size:2em;font-weight:800;color:var(--accent)">${g.centScore}%</div><div style="font-size:.75em;color:var(--text-sec)">Centramento triennale</div></div>
<div style="text-align:center"><div style="font-size:2em;font-weight:800;color:var(--cyan)">${g.concentrazione}%</div><div style="font-size:.75em;color:var(--text-sec)">Concentrazione interessi</div></div>
</div>

<div class="path-badge ${pathClass}" style="display:block;text-align:center">Percorso calcolato: ${g.path} — ${pathNames[g.path]}</div>

<div class="nt" style="margin-top:16px">${g.narrazione}</div>
</div>

<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px">

/* Possibilità di sovrascrivere il percorso calcolato */
function overridePath(){
  const pathNames={A:'Continuità',B:'Complementarità',C:'Esplorazione aperta'};
  let h=`<div class="ws" style="padding:20px 0"><h1 style="font-size:1.4em">🔄 <span>Modifica percorso</span></h1>
<p>Il percorso calcolato è <strong>${gateResult.path} — ${pathNames[gateResult.path]}</strong>. Puoi sovrascriverlo se non ti corrisponde.</p>
<div style="max-width:520px;margin:20px auto">
<div class="area-sel" onclick="setPathOverride('A')"><div class="as-name">A — Continuità</div><div class="as-desc">Privilegia le aree direttamente collegate alla tua triennale</div></div>
<div class="area-sel" onclick="setPathOverride('B')"><div class="as-name">B — Complementarità</div><div class="as-desc">Privilegia le aree adiacenti e complementari</div></div>
<div class="area-sel" onclick="setPathOverride('C')"><div class="as-name">C — Esplorazione aperta</div><div class="as-desc">Tutte le aree alla pari, ordinate per interesse dichiarato</div></div>
</div>
<div style="margin-top:16px"><button class="btn btn-s btn-sm" onclick="showSnodoResult()">← Torna alla diagnostica</button></div></div>`;

}

function setPathOverride(newPath){
  sClick();
  gateResult.path=newPath;
  gateResult.narrazione=gateResult.narrazione.replace(/<strong>Percorso suggerito:.*?<\/strong>/,
    '<strong>Percorso modificato manualmente: '+newPath+' — '+(newPath==='A'?'Continuità':newPath==='B'?'Complementarità':'Esplorazione aperta')+'.</strong>');
  showSnodoResult();
}

/* ===== UI: SELEZIONE AREE (nessun limite) ===== */
function showAreaSelection(){
  curPhase='areaSelect';
  $('sticky-header').style.display='none';$('progress-container').style.display='none';
  const affinities=calcAreaAffinity();
  const chosen=[...selectedAreas];

  // Stima volume domande
  function stimaDomande(ids){
    let tot=0;
    ids.forEach(aId=>{tot+=LM_DB.filter(lm=>lm.a===aId).length*5});
    return tot;
  }

  let h=`<div class="ws" style="padding:20px 0"><h1 style="font-size:1.4em">🗺️ <span>Selezione Aree</span></h1>
<p>Seleziona le macro-aree da esplorare in profondità. Sono ordinate per affinità col tuo profilo. La scelta è tua: nessun limite, ma ogni area aggiunge domande.</p>
<div id="volumeInfo" style="max-width:600px;margin:0 auto 12px;padding:10px 16px;background:var(--accent-bg);border-radius:var(--radius-sm);font-size:.82em;color:var(--accent);font-weight:600">Aree selezionate: ${chosen.length} · Domande aggiuntive stimate: ~${stimaDomande(chosen)}</div>
<div style="max-width:600px;margin:0 auto" id="areaGrid">`;
  affinities.forEach(af=>{
    const isSel=chosen.includes(af.id);
    const lmCount=LM_DB.filter(lm=>lm.a===af.id).length;
    h+=`<div class="area-sel ${isSel?'chosen':''}" id="as_${af.id}" onclick="toggleArea('${af.id}')">
<span class="as-icon">${af.icon}</span>
<div class="as-name">${af.name}</div>
<div class="as-desc">${af.desc} · ${lmCount} LM · ${lmCount*5} domande</div>
<span class="as-pct">${af.pct}%</span>
<div class="as-bar"><div class="as-bf" style="width:${af.pct}%"></div></div>
</div>`;
  });
  h+=`</div>
<div id="areaActions" style="margin-top:16px;display:flex;gap:10px;justify-content:center">
<button class="btn btn-p" id="confirmAreasBtn" onclick="confirmAreas()" ${chosen.length===0?'disabled style="opacity:.5"':''}>Conferma ${chosen.length} ${chosen.length===1?'area':'aree'} →</button>
<button class="btn btn-s btn-sm" onclick="showHub()">← Menu</button>
</div></div>`;
  app.innerHTML=h;
  window._tempAreas=chosen;
}

function toggleArea(aId){
  sClick();
  let chosen=window._tempAreas||[];
  const idx=chosen.indexOf(aId);
  if(idx>=0){chosen.splice(idx,1)}
  else{chosen.push(aId)}
  window._tempAreas=chosen;
  // Aggiorna interfaccia
  document.querySelectorAll('.area-sel').forEach(el=>{
    const id=el.id.replace('as_','');
    el.classList.toggle('chosen',chosen.includes(id));
  });
  const btn=$('confirmAreasBtn');
  if(btn){
    btn.textContent=`Conferma ${chosen.length} ${chosen.length===1?'area':'aree'} →`;
    btn.disabled=chosen.length===0;btn.style.opacity=chosen.length===0?'.5':'1';
  }
  // Aggiorna stima volume
  let tot=0;chosen.forEach(id=>{tot+=LM_DB.filter(lm=>lm.a===id).length*5});
  const vi=$('volumeInfo');
  if(vi) vi.innerHTML=`Aree selezionate: ${chosen.length} · Domande aggiuntive stimate: ~${tot}` + (tot>100?' · <span style="color:var(--amber)">Volume significativo: prevedi 30+ minuti extra</span>':'');
}

function confirmAreas(){
  const chosen=window._tempAreas||[];
  if(chosen.length===0){toast('Seleziona almeno un\'area');return}
  selectedAreas=chosen;
  selectedAreas.forEach(aId=>{if(!adaptiveAnswers[aId])adaptiveAnswers[aId]={}});
  sNav();showHub();
}

/* ===== UI: ADAPTIVE MODULE ===== */

  const area=AREAS.find(a=>a.id===areaId);

  const tLabels=['Curiosità disciplinare','Scenario professionale','Approccio metodologico','Contesto organizzativo','Comunità disciplinare'];

  let h=`<div class="qsec" style="padding-top:90px">`;
  h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px;box-shadow:var(--shadow-sm)"><div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><span style="font-size:2em">${area.icon}</span><div><div style="font-family:'Playfair Display',serif;font-size:1.2em;color:var(--accent);font-weight:700">${area.name}</div><div style="font-size:.85em;color:var(--text-sec);margin-top:2px">${lms.length} lauree magistrali da esplorare · ${lms.length*5} domande</div></div></div></div>`;

  lms.forEach((lm,li)=>{
    if(!aa[lm.c])aa[lm.c]={};
    const lmA=aa[lm.c];
    const lmDone=Object.keys(lmA).length===5;
    h+=`<div style="background:var(--accent-bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin:16px 0 8px;font-weight:700;font-size:.9em;color:var(--accent)">${lm.c} — ${lm.n} ${lmDone?'✓':''}</div>`;
    templates.forEach((tFn,qi)=>{
      const qn=qi+1;
      const ans=lmA[qn];const isAns=ans!==undefined;
      h+=`<div class="qc ${isAns?'ans':''}" id="aqc_${lm.c}_${qn}"><div class="qnum">${tLabels[qi]}</div><div class="qt">${tFn(lm)}</div><div class="ls">`;
      scale.forEach(s=>{h+=`<div class="lo ${ans===s.v?'sel':''}" onclick="pickAdaptive('${areaId}','${lm.c}',${qn},${s.v},this)"><span class="lv">${s.v}</span><span class="ll">${s.l}</span></div>`});
      h+=`</div></div>`;
    });
  });

  h+=`<div class="nb"><button class="btn btn-s btn-sm" onclick="showHub()">← Menu</button><div class="nc" id="bnc">${totalLmDone}/${lms.length} LM completate</div><button class="btn btn-sm ${totalLmDone===lms.length?'btn-g':'btn-p'}" onclick="showHub()">✓ Menu</button></div></div>`;
  app.innerHTML=h;
  updateGlobalBar();
  window.scrollTo({top:0,behavior:'smooth'});
}

function pickAdaptive(areaId,lmCode,qn,v,el){
  sClick();
  if(!adaptiveAnswers[areaId])adaptiveAnswers[areaId]={};
  if(!adaptiveAnswers[areaId][lmCode])adaptiveAnswers[areaId][lmCode]={};
  adaptiveAnswers[areaId][lmCode][qn]=v;
  const card=el.closest('.qc');card.querySelectorAll('.lo').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');card.classList.add('ans');
  // Check if this LM is complete
  const la=adaptiveAnswers[areaId][lmCode];
  if(Object.keys(la).length===5){sDone();toast('LM completata! ✨',1500)}
  // Update counter
  const lms=LM_DB.filter(lm=>lm.a===areaId);
  const aa=adaptiveAnswers[areaId];
  let totalLmDone=0;lms.forEach(lm=>{const a2=aa[lm.c]||{};if(Object.keys(a2).length===5)totalLmDone++});
  const snc=$('snc');if(snc)snc.textContent=totalLmDone+'/'+lms.length+' LM';
  const bnc=$('bnc');if(bnc)bnc.textContent=totalLmDone+'/'+lms.length+' LM completate';
  updateGlobalBar();
}

function updateGlobalBar(){
  const total=getTotalQuestions(),done=getAnsweredCount();
  const gPct=total?Math.round(done/total*100):0;
  const pb=$('pbi');if(pb){pb.style.width=gPct+'%';const pp=$('pbi-pct');if(pp)pp.textContent=gPct+'%';}
}

/* ===== REPORT ===== */
function showReport(){
  sCeleb();charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];
  $('sticky-header').style.display='none';$('progress-container').style.display='none';
  const sc=calcAllModAScores();
  const modBsc=calcModBScores();
  const adaptSc=calcAdaptiveScores();
  const fullName=(userData.nome+(userData.cognome?' '+userData.cognome:'')).trim()||'Utente';
  const displayDate=userData.data?new Date(userData.data).toLocaleDateString('it-IT'):new Date().toLocaleDateString('it-IT');

  let h=`<div class="rp"><div class="ph"><h1>🎓 Report Orientamento Laurea Magistrale</h1><p>${fullName} · ${displayDate} · ${userData.classeTri||'—'}</p></div>`;
  h+=`<div class="tb no-print"><button class="btn btn-p btn-sm" onclick="showHub()">← Menu</button><button class="btn btn-s btn-sm" onclick="window.print()">🖨 Stampa</button><button class="btn btn-s btn-sm" onclick="saveState()">💾 JSON</button><button class="btn btn-s btn-sm" onclick="showOpReport()">👨‍🏫 Operatore</button><button class="btn btn-s btn-sm" onclick="exMD()">📄 Markdown</button></div>`;

  // Gate summary
  if(gateResult){
    const pathNames={A:'Continuità',B:'Complementarità',C:'Esplorazione aperta'};
    h+=`<div class="rc"><h3>🚦 Snodo — Diagnostica</h3><div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap"><div><strong>Prontezza LM:</strong> ${gateResult.prontezza}%</div><div><strong>Centramento:</strong> ${gateResult.centScore}%</div><div><strong>Percorso:</strong> ${gateResult.path} — ${pathNames[gateResult.path]}</div><div><strong>Concentrazione:</strong> ${gateResult.concentrazione}%</div></div>`;
    h+=`<div class="nt" style="margin-top:12px">${gateResult.narrazione}</div>`;
    h+=`</div>`;
  }

  // LM Ranking
  if(Object.keys(adaptSc).length>0){
    h+=`<div class="rc"><h3>🏆 Ranking Lauree Magistrali</h3><p style="font-size:.82em;color:var(--text-sec);margin-bottom:12px">Classifica basata sulle tue risposte nell'esplorazione adattiva.</p>`;
    let allLM=[];
    Object.entries(adaptSc).forEach(([aId,lms])=>{
      const area=AREAS.find(a=>a.id===aId);
      lms.forEach(lm=>{allLM.push({...lm,areaName:area?.name||aId,areaIcon:area?.icon||''})});
    });
    allLM.sort((a,b)=>b.pct-a.pct);
    allLM.forEach((lm,i)=>{
      const lmData=LM_DB.find(l=>l.c===lm.code);
      const avail=ATENEI.filter(at=>at.aree.includes(lmData?.a||'')).map(at=>at.nome).join(', ');
      h+=`<div class="sbc"><div class="sbl"><span>${i+1}. ${lm.areaIcon} ${lm.code} — ${lm.name}${i<5?' ⭐':''}</span><span>${lm.pct}%</span></div><div class="sb"><div class="sbf" style="width:${lm.pct}%;${i<5?'background:linear-gradient(90deg,var(--amber),var(--green))':''}">​</div></div></div>`;
      if(i<8 && avail) h+=`<div style="margin:-4px 0 8px 16px;font-size:.75em;color:var(--text-sec)">Disponibile in: ${avail}</div>`;
    });

    // Radar chart for top areas
    h+=`<div class="cc"><canvas id="chRank"></canvas></div>`;
    h+=`</div>`;
  }

  // Module A sections
  MOD_A.forEach((section,idx)=>{
    const s=sc[section.id];if(!s)return;
    h+=`<div class="rc"><h3>${section.icon} ${section.title}</h3><div class="cc"><canvas id="chA${idx}"></canvas></div>`;
    Object.entries(s).forEach(([k,v])=>{
      h+=`<div class="sbc"><div class="sbl"><span>${k}${v.neg?' ⚠':''}</span><span>${v.pct}%</span></div><div class="sb"><div class="sbf" style="width:${v.pct}%;${v.neg?'background:linear-gradient(90deg,var(--rose),var(--amber))':''}">​</div></div></div>`;
    });
    h+=`<div class="nt">${genNarr(section.id,s)}</div></div>`;
  });

  // Module B
  modBsc.forEach((ms,idx)=>{
    const section=MOD_B[idx];
    h+=`<div class="rc"><h3>${section.icon} ${section.title}</h3>`;
    Object.entries(ms.scores).forEach(([k,v])=>{
      h+=`<div class="sbc"><div class="sbl"><span>${k}</span><span>${v.pct}%</span></div><div class="sb"><div class="sbf" style="width:${v.pct}%">​</div></div></div>`;
    });
    h+=`</div>`;
  });

  // Triennale comparison (if imported)
  if(triennaleData){
    h+=`<div class="compare-card"><h4>📋 Come sei cambiato — Confronto con il profilo triennale</h4>`;
    h+=`<div class="nt">${genTriennaleComparison(sc)}</div></div>`;
  }

  h+=`</div>`;
  app.innerHTML=h;

  // Draw charts
  setTimeout(()=>{
    // LM Ranking radar
    if(Object.keys(adaptSc).length>0){
      const allLM=[];
      Object.entries(adaptSc).forEach(([aId,lms])=>{lms.forEach(lm=>allLM.push(lm))});
      allLM.sort((a,b)=>b.pct-a.pct);
      const top=allLM.slice(0,8);
      const cv=document.getElementById('chRank');
      if(cv){
        const ch=new Chart(cv,{type:'bar',data:{labels:top.map(l=>l.code),datasets:[{label:'Affinità',data:top.map(l=>l.pct),backgroundColor:top.map((_,i)=>`hsla(${((i*360/top.length)+220)%360},65%,55%,.7)`),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100},x:{ticks:{font:{size:9}}}}}});
        charts.push(ch);
      }
    }
    // Module A charts
    MOD_A.forEach((section,idx)=>{
      const s=sc[section.id];if(!s)return;
      const cv=document.getElementById('chA'+idx);if(!cv)return;
      const labels=Object.keys(s),data=labels.map(k=>s[k].pct);
      const colors=labels.map((_,i)=>`hsla(${((i*360/labels.length)+220)%360},65%,55%,.7)`);
      const ch=new Chart(cv,{type:labels.length>5?'radar':'bar',data:{labels,datasets:[{label:section.title,data,backgroundColor:colors,borderColor:colors.map(c=>c.replace('.7)','.9)')),borderWidth:2,fill:labels.length>5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:labels.length>5?{r:{min:0,max:100,ticks:{stepSize:25}}}:{y:{min:0,max:100},x:{ticks:{font:{size:9}}}}}});
      charts.push(ch);
    });
  },250);
}

/* ===== NARRATIVE GENERATORS ===== */
function genNarr(id,sc){
  const hi=a=>sc[a]?.pct>=65, lo=a=>sc[a]?.pct<35;
  let t='';
  switch(id){
  case 'centramento':
    const centScore=calcCentramento();
    if(centScore>=70) t='Profilo con alto centramento sulla triennale ('+centScore+'%). La scelta appare consapevole e confermata dall\'esperienza. La magistrale può costruire con fiducia su questa base.';
    else if(centScore>=45) t='Centramento moderato ('+centScore+'%). La triennale ha dato strumenti ma lascia spazi di evoluzione. La magistrale è un\'opportunità per consolidare o riorientare.';
    else t='Centramento basso ('+centScore+'%). Segnali significativi di insoddisfazione o evoluzione rispetto alla scelta triennale. La magistrale è un punto di svolta: va scelta con particolare attenzione alla coerenza con chi sei oggi, non con chi eri tre anni fa.';
    if(hi('Biforcazioni')) t+=' Biforcazioni mancate rilevanti: esplorare le aree non scelte potrebbe essere strategico.';
    break;
  case 'locus':
    if(hi('Interno')&&lo('Esterno')) t='Forte locus interno. Ti percepisci artefice del tuo percorso: risorsa preziosa in un biennio che richiede autonomia e iniziativa.';
    else if(hi('Esterno')) t='Prevalenza di attribuzione esterna. La magistrale richiede alta agentività: consapevolezza utile per attivare strategie compensative.';
    else t='Equilibrio tra locus interno ed esterno. Profilo realistico che bilancia senso di responsabilità personale e consapevolezza del contesto.';
    break;
  case 'coping':
    if(hi('Attivo')&&lo('Evitante')) t='Stile di coping prevalentemente attivo: affronti le difficoltà con metodo. Profilo adatto alla complessità della magistrale.';
    else if(hi('Evitante')) t='Componente evitante significativa. La magistrale comporta carichi concentrati e autonomia: sviluppare strategie attive è prioritario.';
    else if(hi('Regolazione')) t='Buona capacità di regolazione emotiva e metacognitiva. Risorsa preziosa per gestire la pressione del biennio.';
    else t='Profilo di coping distribuito. Flessibilità potenziale, ma nessuna strategia dominante.';
    break;
  case 'softskills':
    const topS=Object.entries(sc).sort((a,b)=>b[1].pct-a[1].pct).slice(0,3);
    const weakS=Object.entries(sc).filter(([k,v])=>v.pct<40).map(([k])=>k);
    t='Competenze più sviluppate: '+topS.map(([k,v])=>'<strong>'+k+'</strong> ('+v.pct+'%)').join(', ')+'. ';
    if(weakS.length) t+='Da potenziare per la magistrale: '+weakS.join(', ')+'.';
    else t+='Profilo competenziale solido su tutti gli assi.';
    break;
  case 'apprendimento':
    const topA=Object.entries(sc).sort((a,b)=>b[1].pct-a[1].pct).slice(0,2);
    t='Stili predominanti: '+topA.map(([k,v])=>'<strong>'+k+'</strong> ('+v.pct+'%)').join(' e ')+'. ';
    if(sc['Ricerca']?.pct>sc['Applicazione']?.pct+15) t+='Orientamento marcato verso la ricerca: considera magistrali con forte componente di tesi sperimentale e possibilità di dottorato.';
    else if(sc['Applicazione']?.pct>sc['Ricerca']?.pct+15) t+='Orientamento marcato verso l\'applicazione: cerca magistrali con tirocini strutturati, project work e placement aziendale.';
    else t+='Equilibrio tra ricerca e applicazione: profilo flessibile che può adattarsi a diverse tipologie di magistrale.';
    break;
  default: t='Analisi non disponibile.'
  }
  return t;
}

function genTriennaleComparison(currentSc){
  if(!triennaleData) return '';
  let t='<strong>Confronto con il profilo triennale importato.</strong><br><br>';
  // Compare locus
  const triSc=triennaleData.answers||{};
  if(triSc.locus && currentSc.locus){
    t+='<strong>Locus of Control:</strong> ';
    const triInt=Object.values(triSc.locus).filter((_,i)=>i%2===0).reduce((s,v)=>s+(v||0),0);
    const curInt=currentSc.locus?.['Interno']?.pct||50;
    t+=`Il tuo locus interno attuale è ${curInt}%. `;
    t+='Il confronto con il profilo triennale permette di valutare se la tua percezione di agentività si è consolidata o indebolita nel percorso.<br><br>';
  }
  if(triSc.coping && currentSc.coping){
    t+='<strong>Coping:</strong> ';
    const curAtt=currentSc.coping?.['Attivo']?.pct||50;
    t+=`Il tuo coping attivo attuale è ${curAtt}%. Confronta con il profilo precedente per verificare l'evoluzione delle tue strategie di fronteggiamento.<br><br>`;
  }
  t+='<em>Nota: il confronto è indicativo. I due questionari misurano costrutti analoghi ma non identici, adattati al diverso stadio del percorso.</em>';
  return t;
}

/* ===== OPERATOR REPORT ===== */
function showOpReport(){
  const sc=calcAllModAScores();
  const modBsc=calcModBScores();
  const adaptSc=calcAdaptiveScores();
  const fullName=(userData.nome+(userData.cognome?' '+userData.cognome:'')).trim()||'N/D';
  const cl=getClasseTri(userData.classeTri);
  let t='=== REPORT OPERATORE - ORIENTAMENTO LAUREA MAGISTRALE ===\n';
  t+='Data: '+(userData.data||new Date().toLocaleDateString('it-IT'))+'\n';
  t+='Nome: '+fullName+'\nEtà: '+(userData.eta||'N/D')+'\n';
  t+='Triennale: '+(userData.classeTri||'N/D')+(cl?' — '+cl.n:'')+'\nVoto: '+(userData.voto||'N/D')+'\n\n';

  if(gateResult){
    t+='--- SNODO ---\nProntezza LM: '+gateResult.prontezza+'%\nCentramento: '+gateResult.centScore+'%\nConcentrazione interessi: '+gateResult.concentrazione+'%\nPercorso: '+gateResult.path+'\n';
    if(gateResult.segnali?.length) gateResult.segnali.forEach(s=>{t+='SEGNALE: '+s.replace(/<[^>]+>/g,'')+'\n'});
    t+='\n';
  }

  t+='--- ISTRUZIONI PER L\'IA ---\nAnalizza questo profilo per orientamento alla laurea magistrale.\n[R] = scala inversa. [NEG] = area barriere.\n\n';

  MOD_A.forEach(section=>{
    const s=sc[section.id];if(!s)return;
    t+='=== '+section.title.toUpperCase()+' ===\n';
    section.items.forEach(it=>{const v=(answers[section.id]||{})[it.n];t+='  '+it.n+'. '+it.t+(it.r?' [R]':'')+' => '+(v!==undefined?v:'N/R')+'\n'});
    t+='\nPunteggi:\n';
    Object.entries(s).forEach(([k,v])=>{t+='  '+k+(v.neg?' [NEG]':'')+': '+v.sum+'/'+v.max+' ('+v.pct+'%)\n'});
    t+='\n';
  });

  if(Object.keys(adaptSc).length>0){
    t+='=== RANKING LAUREE MAGISTRALI ===\n';
    let allLM=[];
    Object.entries(adaptSc).forEach(([aId,lms])=>{lms.forEach(lm=>allLM.push({...lm,area:aId}))});
    allLM.sort((a,b)=>b.pct-a.pct);
    allLM.forEach((lm,i)=>{t+=(i+1)+'. '+lm.code+' — '+lm.name+': '+lm.pct+'%\n'});
    t+='\n';
  }

  modBsc.forEach(ms=>{
    const section=MOD_B.find(s=>s.id===ms.id);
    t+='=== '+section.title.toUpperCase()+' ===\n';
    Object.entries(ms.scores).forEach(([k,v])=>{t+='  '+k+': '+v.pct+'%\n'});
    t+='\n';
  });

  // Prompts
  const topLM=Object.values(adaptSc).flat().sort((a,b)=>b.pct-a.pct).slice(0,3);
  t+='=== PROMPT IA PRE-CONFEZIONATI ===\n\n';
  t+='PROMPT 1 – Analisi Completa:\n"Profilo studente '+fullName+' per orientamento magistrale.\n';
  t+='Triennale: '+(userData.classeTri||'N/D')+'\nGate: Path '+(gateResult?.path||'N/D')+', Centramento '+(gateResult?.centScore||'N/D')+'%\n';
  if(topLM.length) t+='Top LM: '+topLM.map(l=>l.code+' '+l.pct+'%').join(', ')+'\n';
  t+='Analizza coerenza profilo-scelta, punti di forza, aree critiche. Suggerisci 3 azioni concrete."\n\n';

  t+='PROMPT 2 – Percorso Praticabile:\n"Per '+(topLM[0]?.code||'[LM]')+', cerca programmi accessibili dalla Lombardia.\n';
  t+='Per ogni ateneo: requisiti, test, costi, placement, doppi titoli disponibili."\n\n';

  t+='=== FINE ===\n';

  $('opT').value=t;$('opM').classList.add('act');
}

function cpOp(){navigator.clipboard.writeText($('opT').value).then(()=>toast('Copiato! ✓')).catch(()=>{$('opT').select();document.execCommand('copy');toast('Copiato! ✓')})}

/* ===== EXPORT MARKDOWN ===== */
function exMD(){
  const sc=calcAllModAScores();const adaptSc=calcAdaptiveScores();
  const fullName=(userData.nome+(userData.cognome?' '+userData.cognome:'')).trim()||'Utente';
  let md='# Report Orientamento Laurea Magistrale\n\n';
  md+='**Utente:** '+fullName+' | **Data:** '+new Date().toLocaleDateString('it-IT')+'\n';
  md+='**Triennale:** '+(userData.classeTri||'N/D')+'\n\n';
  if(gateResult) md+='## 🚦 Gate\nCentramento: '+gateResult.centScore+'% | Path: '+gateResult.path+'\n\n';
  if(Object.keys(adaptSc).length>0){
    md+='## 🏆 Ranking LM\n\n';
    let allLM=[];Object.entries(adaptSc).forEach(([aId,lms])=>{lms.forEach(lm=>allLM.push(lm))});
    allLM.sort((a,b)=>b.pct-a.pct);
    allLM.forEach((lm,i)=>{md+=(i+1)+'. **'+lm.code+' — '+lm.name+'**: '+lm.pct+'%\n'});
    md+='\n';
  }
  MOD_A.forEach(section=>{
    const s=sc[section.id];if(!s)return;
    md+='## '+section.icon+' '+section.title+'\n\n';
    Object.entries(s).forEach(([k,v])=>{md+='- **'+k+'**: '+v.pct+'%'+(v.neg?' ⚠':'')+'\n'});
    md+='\n> '+genNarr(section.id,s).replace(/<[^>]+>/g,'')+'\n\n';
  });
  const blob=new Blob([md],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='orientamento_LM_'+(userData.nome||'utente')+'_'+new Date().toISOString().slice(0,10)+'.md';
  a.click();toast('Markdown esportato! ✓');
}
